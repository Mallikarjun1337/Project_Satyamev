[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=90
asyncio_mode = auto
markers =
    property: marks tests as property-based tests (deselect with '-m "not property"')
